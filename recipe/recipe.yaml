schema_version: 1

context:
  name: seekpath
  version: "2.2.1"
  sha256: 10906f13e3db5ed511b85ada2c0eba9f90ae764078a21809035561b0116a66a3

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: ${{ sha256 }}

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - flit-core
  run:
    - python >=${{ python_min }}
    - numpy >=1.0
    - spglib >=1.9.4
    - scipy

tests:
  - python:
      imports:
        - seekpath
        - seekpath.brillouinzone
        - seekpath.hpkot
      pip_check: false
      python_version: ${{ python_min }}
about:
  license: MIT
  license_file: LICENSE.txt
  summary: A module to obtain and visualize k-vector coefficients and obtain band paths in the Brillouin zone of crystal structures.
  homepage: http://github.com/giovannipizzi/seekpath

extra:
  recipe-maintainers:
    - t-reents
    - npavlovikj
    - jan-janssen
